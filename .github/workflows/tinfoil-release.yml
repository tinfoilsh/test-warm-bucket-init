# Tinfoil Containers release workflow (phase 1 — initiate a release).
#
# Trigger this workflow from a branch via "Run workflow" and provide the
# version. It builds the image, updates tinfoil-config.yml, creates the release
# tag, and then dispatches phase 2 in `tinfoil-release-publish.yml` against the
# new tag to attest the image and publish the GitHub release.

name: Tinfoil Release

run-name: Release ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v0.0.1)'
        required: true
        type: string

concurrency:
  group: tinfoil-container-release-${{ inputs.version }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Check if version tag already exists
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git ls-remote --tags origin "refs/tags/$VERSION" | grep -q .; then
            echo "::error::Tag $VERSION already exists"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }}
            type=sha,format=short

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  prepare-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write

    steps:
      - name: Update tinfoil-config.yml and create the release tag
        uses: tinfoilsh/update-container-action@v0.6.0
        with:
          version: ${{ inputs.version }}
          source-sha: ${{ github.sha }}
          update-config: true
          image-refs: |
            ghcr.io/${{ github.repository }}@${{ needs.build.outputs.digest }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Dispatch the publish workflow on the new tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ inputs.version }}
        run: |
          gh workflow run tinfoil-release-publish.yml --ref "$VERSION"
